name: Test Python Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      HF_HOME: ~/.cache/huggingface
      HF_HUB_CACHE: ~/.cache/huggingface/hub

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup UV with cache
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Cache Hugging Face hub
        id: hf-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Show Hugging Face cache status
        run: |
          echo "hf-cache-hit=${{ steps.hf-cache.outputs.cache-hit }}"
          echo "HF_HOME=$HF_HOME"
          du -sh "$HF_HOME" || true
          du -sh "$HF_HUB_CACHE" || true

      - name: Sync dependencies with uv
        run: uv sync

      - name: Run tests
        run: uv run pytest --cov=DeepSDFStruct --cov-report=term-missing --cov-report=xml tests

      - name: Coveralls
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: coverallsapp/github-action@v2
